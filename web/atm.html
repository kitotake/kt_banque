<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KT Banque — Distributeur</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style/main.css" />
  <link rel="stylesheet" href="style/account.css" />
</head>
<body>
  <div id="atm-container" class="screen">
    <header class="atm-header">
      <h1>🏧 Distributeur Automatique</h1>
      <button id="closeAtmBtn" class="btn-close">✕</button>
    </header>

    <main class="atm-main">
      <section class="atm-balance">
        <div class="label">Solde disponible</div>
        <div id="atmBalance" class="balance">$0</div>
      </section>

      <section class="limits">
        <div class="limit-item">
          <span class="limit-label">📥 Dépôt max</span>
          <span class="limit-value" id="atmDepositLimit">$5000</span>
        </div>
        <div class="limit-item">
          <span class="limit-label">📤 Retrait max</span>
          <span class="limit-value" id="atmWithdrawLimit">$2000</span>
        </div>
      </section>

      <section class="actions">
        <div class="action-card">
          <div class="action-header">
            <span class="action-icon">💰</span>
            <h3>Déposer</h3>
          </div>
          <input id="atmDepositAmount" type="number" placeholder="Montant" min="1" class="input-amount" />
          <button id="atmDepositBtn" class="btn-action btn-deposit">Déposer</button>
        </div>

        <div class="action-card">
          <div class="action-header">
            <span class="action-icon">💵</span>
            <h3>Retirer</h3>
          </div>
          <input id="atmWithdrawAmount" type="number" placeholder="Montant" min="1" class="input-amount" />
          <button id="atmWithdrawBtn" class="btn-action btn-withdraw">Retirer</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <small>💡 Appuyez sur <kbd>ESC</kbd> pour fermer</small>
    </footer>
  </div>

</body>
</html>
